unbind C-b
set -g prefix C-x
bind C-x send-prefix

set -g base-index 1
setw -g pane-base-index 1
set -s escape-time 0

set -g mouse on
set-window-option -g mode-keys vi
set -g status-style 'bg=#333333 fg=#5eacd3'
set -g default-terminal "tmux-256color"
set -g default-shell /usr/bin/bash
set -g set-clipboard on
set -g allow-passthrough on
set -g extended-keys on
set -gu terminal-features

# slower / saner wheel behavior
bind -n WheelUpPane {
    if -F '#{pane_in_mode}' {
        send -N1 -X scroll-up
    } {
        if -F '#{mouse_any_flag}' {
            send -M
        } {
            if -F '#{alternate_on}' { send-keys Up } { copy-mode -e }
        }
    }
}

bind -n WheelDownPane {
    if -F '#{pane_in_mode}' {
        send -N1 -X scroll-down
    } {
        if -F '#{mouse_any_flag}' {
            send -M
        } {
            if -F '#{alternate_on}' { send-keys Down }
        }
    }
}

bind-key n new-window
bind-key d kill-window

bind-key q detach-client
bind-key Q confirm-before -p "kill-session #S? (y/n)" kill-session

# split panes using | and -
bind | split-window -h
bind - split-window -v

unbind -n C-h
unbind -n C-l
unbind -n C-j
unbind -n C-k

bind C-h select-pane -L
bind C-l select-pane -R
bind C-j select-pane -U
bind C-k select-pane -D

# reload config file
bind r source-file ~/.config/tmux/tmux.conf

bind-key -n C-f display-popup -E -w 60% -h 60% -T "tmux-sessionizer" "~/.config/tmux/tmux-sessionizer"

# switch panes using Alt-number without prefix
bind -n M-1 select-window -t 1
bind -n M-2 select-window -t 2
bind -n M-3 select-window -t 3
bind -n M-4 select-window -t 4
bind -n M-5 select-window -t 5
bind -n M-6 select-window -t 6
bind -n M-7 select-window -t 7
bind -n M-8 select-window -t 8
bind -n M-9 select-window -t 9
bind -n M-0 select-window -t 10

set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'

set -g @continuum-restore 'on'
set -g @continuum-save-interval '1' # Autosave every 1 minute

if "test ! -d ~/.tmux/plugins/tpm" \
   "run 'git clone https://github.com/tmux-plugins/tpm ~/.tmux/plugins/tpm && ~/.tmux/plugins/tpm/bin/install_plugins'"

run '~/.tmux/plugins/tpm/tpm'
