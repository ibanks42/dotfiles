$mainMod = SUPER

# apps
bind = $mainMod, RETURN, exec, $terminal
bind = $mainMod, SPACE, exec, $menu
bind = $mainMod, B, exec, $browser
bind = $mainMod, E, exec, $fileManager

# session/window
bind = $mainMod, Q, killactive
bind = $mainMod SHIFT, Q, exit
bind = $mainMod SHIFT, C, exec, /bin/sh -c '/home/ibanks/.local/bin/hyprctl-current reload && pkill -SIGUSR2 waybar'
bind = $mainMod, F, fullscreen, 0
bind = $mainMod SHIFT, F, togglefloating
bind = $mainMod, D, togglesplit
bind = $mainMod, P, pseudo
# bind = $mainMod, S, togglespecialworkspace, scratchpad
# bind = $mainMod SHIFT, S, movetoworkspacesilent, special:scratchpad

# focus
bind = $mainMod, H, movefocus, l
bind = $mainMod, L, movefocus, r
bind = $mainMod, K, movefocus, u
bind = $mainMod, J, movefocus, d

# swap
bind = $mainMod SHIFT, H, swapwindow, l
bind = $mainMod SHIFT, L, swapwindow, r
bind = $mainMod SHIFT, K, swapwindow, u
bind = $mainMod SHIFT, J, swapwindow, d

# resize
binde = $mainMod CTRL, H, resizeactive, -40 0
binde = $mainMod CTRL, L, resizeactive, 40 0
binde = $mainMod CTRL, K, resizeactive, 0 -40
binde = $mainMod CTRL, J, resizeactive, 0 40

# monitors / workspaces
bind = $mainMod, 1, exec, /home/ibanks/.local/bin/hypr-workspacectl focus-monitor 1
bind = $mainMod, 2, exec, /home/ibanks/.local/bin/hypr-workspacectl focus-monitor 2
bind = $mainMod, 3, exec, /home/ibanks/.local/bin/hypr-workspacectl focus-monitor 3

bind = $mainMod SHIFT, 1, exec, /home/ibanks/.local/bin/hypr-workspacectl move-to-monitor 1
bind = $mainMod SHIFT, 2, exec, /home/ibanks/.local/bin/hypr-workspacectl move-to-monitor 2
bind = $mainMod SHIFT, 3, exec, /home/ibanks/.local/bin/hypr-workspacectl move-to-monitor 3

bind = $mainMod, F1, exec, /home/ibanks/.local/bin/hypr-workspacectl goto-workspace 1
bind = $mainMod, F2, exec, /home/ibanks/.local/bin/hypr-workspacectl goto-workspace 2
bind = $mainMod, F3, exec, /home/ibanks/.local/bin/hypr-workspacectl goto-workspace 3
bind = $mainMod, F4, exec, /home/ibanks/.local/bin/hypr-workspacectl goto-workspace 4
bind = $mainMod, F5, exec, /home/ibanks/.local/bin/hypr-workspacectl goto-workspace 5
bind = $mainMod, F6, exec, /home/ibanks/.local/bin/hypr-workspacectl goto-workspace 6
bind = $mainMod, F7, exec, /home/ibanks/.local/bin/hypr-workspacectl goto-workspace 7
bind = $mainMod, F8, exec, /home/ibanks/.local/bin/hypr-workspacectl goto-workspace 8
bind = $mainMod, F9, exec, /home/ibanks/.local/bin/hypr-workspacectl goto-workspace 9

bind = $mainMod SHIFT, F1, exec, /home/ibanks/.local/bin/hypr-workspacectl move-to-workspace 1
bind = $mainMod SHIFT, F2, exec, /home/ibanks/.local/bin/hypr-workspacectl move-to-workspace 2
bind = $mainMod SHIFT, F3, exec, /home/ibanks/.local/bin/hypr-workspacectl move-to-workspace 3
bind = $mainMod SHIFT, F4, exec, /home/ibanks/.local/bin/hypr-workspacectl move-to-workspace 4
bind = $mainMod SHIFT, F5, exec, /home/ibanks/.local/bin/hypr-workspacectl move-to-workspace 5
bind = $mainMod SHIFT, F6, exec, /home/ibanks/.local/bin/hypr-workspacectl move-to-workspace 6
bind = $mainMod SHIFT, F7, exec, /home/ibanks/.local/bin/hypr-workspacectl move-to-workspace 7
bind = $mainMod SHIFT, F8, exec, /home/ibanks/.local/bin/hypr-workspacectl move-to-workspace 8
bind = $mainMod SHIFT, F9, exec, /home/ibanks/.local/bin/hypr-workspacectl move-to-workspace 9

bind = $mainMod, TAB, workspace, e+1
bind = $mainMod SHIFT, TAB, workspace, e-1
bind = ALT, TAB, cyclenext
bind = ALT, TAB, bringactivetotop
bind = ALT SHIFT, TAB, cyclenext, prev
bind = ALT SHIFT, TAB, bringactivetotop

# lock
bind = $mainMod ALT, L, exec, hyprlock -c ~/.config/hypr/hyprlock.conf

# screenshots
bind = $mainMod SHIFT, S, exec, grim -g "$(slurp)" - | wl-copy

# media / brightness
bindl = , XF86AudioRaiseVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%+
bindl = , XF86AudioLowerVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
bindl = , XF86AudioMute, exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle
bindl = , XF86AudioMicMute, exec, wpctl set-mute @DEFAULT_AUDIO_SOURCE@ toggle
bindl = , XF86MonBrightnessUp, exec, brightnessctl set +10%
bindl = , XF86MonBrightnessDown, exec, brightnessctl set 10%-

# mouse
bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow
