$mainMod = SUPER

# apps
bind = $mainMod, RETURN, exec, $terminal
bind = $mainMod, SPACE, exec, $menu
bind = $mainMod, B, exec, $browser
bind = $mainMod, D, exec, $discord
bind = $mainMod, E, exec, $fileManager

# session/window
bind = $mainMod, Q, killactive
bind = $mainMod SHIFT, Q, exit
bind = $mainMod SHIFT, C, exec, /bin/sh -c 'hyprctl reload && pkill -SIGUSR2 waybar'
bind = $mainMod, F, fullscreen, 0
bind = $mainMod SHIFT, F, togglefloating
bind = $mainMod, D, togglesplit
bind = $mainMod, P, pseudo
# previous workspace (per-monitor)
bind = $mainMod, TAB, exec, /home/ibanks/.local/bin/hypr-workspacectl previous-workspace

# toggle between current and last window
bind = $mainMod, GRAVE, focuscurrentorlast

# scratchpad workspace
bind = $mainMod, S, exec, /home/ibanks/.local/bin/hypr-workspacectl toggle-scratchpad
bind = $mainMod ALT, S, exec, /home/ibanks/.local/bin/hypr-workspacectl move-to-scratchpad

# focus (between windows)
bind = $mainMod, left, movefocus, l
bind = $mainMod, right, movefocus, r
bind = $mainMod, up, movefocus, u
bind = $mainMod, down, movefocus, d

# swap
# bind = $mainMod SHIFT, H, swapwindow, l
# bind = $mainMod SHIFT, L, swapwindow, r
# bind = $mainMod SHIFT, K, swapwindow, u
# bind = $mainMod SHIFT, J, swapwindow, d
bind = $mainMod SHIFT, left, movewindow, l
bind = $mainMod SHIFT, right, movewindow, r
bind = $mainMod SHIFT, up, movewindow, u
bind = $mainMod SHIFT, down, movewindow, d

# resize
binde = $mainMod CTRL, H, resizeactive, -40 0
binde = $mainMod CTRL, L, resizeactive, 40 0
binde = $mainMod CTRL, K, resizeactive, 0 -40
binde = $mainMod CTRL, J, resizeactive, 0 40

# monitors / workspaces
bind = $mainMod, 1, exec, /home/ibanks/.local/bin/hypr-workspacectl focus-monitor-or-cycle 1
bind = $mainMod, 2, exec, /home/ibanks/.local/bin/hypr-workspacectl focus-monitor-or-cycle 2
bind = $mainMod, 3, exec, /home/ibanks/.local/bin/hypr-workspacectl focus-monitor-or-cycle 3

bind = $mainMod SHIFT, 1, exec, /home/ibanks/.local/bin/hypr-workspacectl move-to-monitor 1
bind = $mainMod SHIFT, 2, exec, /home/ibanks/.local/bin/hypr-workspacectl move-to-monitor 2
bind = $mainMod SHIFT, 3, exec, /home/ibanks/.local/bin/hypr-workspacectl move-to-monitor 3

# workspace cycling on current monitor
bind = $mainMod, H, exec, /home/ibanks/.local/bin/hypr-workspacectl cycle-workspace -1
bind = $mainMod, L, exec, /home/ibanks/.local/bin/hypr-workspacectl cycle-workspace 1

# move window to adjacent workspace on current monitor
bind = $mainMod SHIFT, H, exec, /home/ibanks/.local/bin/hypr-workspacectl move-to-relative-workspace -1
bind = $mainMod SHIFT, L, exec, /home/ibanks/.local/bin/hypr-workspacectl move-to-relative-workspace 1
bind = $mainMod SHIFT, TAB, exec, /home/ibanks/.local/bin/hypr-workspacectl cycle-workspace -1
bind = ALT, TAB, cyclenext
bind = ALT, TAB, bringactivetotop
bind = ALT SHIFT, TAB, cyclenext, prev
bind = ALT SHIFT, TAB, bringactivetotop

# lock
bind = $mainMod ALT, O, exec, hyprlock -c ~/.config/hypr/hyprlock.conf
bind = $mainMod SHIFT, P, exec, hyprctl dispatch exit

# screenshots
bind = $mainMod SHIFT, S, exec, grim -g "$(slurp)" - | wl-copy

# display
bind = $mainMod ALT, H, exec, /home/ibanks/.local/bin/hypr-toggle-hdr

# media / brightness
bindl = , XF86AudioRaiseVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%+
bindl = , XF86AudioLowerVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
bindl = , XF86AudioMute, exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle
bindl = , XF86AudioMicMute, exec, wpctl set-mute @DEFAULT_AUDIO_SOURCE@ toggle
bindl = , XF86MonBrightnessUp, exec, brightnessctl set +10%
bindl = , XF86MonBrightnessDown, exec, brightnessctl set 10%-

# mouse
bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow
