$mainMod = SUPER
$terminal = ghostty
$browser = app.zen_browser.zen
$fileManager = dolphin
$menu = walker
$discord = vesktop

env = XCURSOR_SIZE,24
env = HYPRCURSOR_SIZE,24
env = QT_QPA_PLATFORM,wayland
env = GDK_BACKEND,wayland,x11
env = SDL_VIDEODRIVER,wayland
env = CLUTTER_BACKEND,wayland
env = XDG_MENU_PREFIX,plasma-
env = XDG_CURRENT_DESKTOP,Hyprland
env = XDG_SESSION_DESKTOP,Hyprland

general {
  gaps_in = 0
  gaps_out = 0, 0, 0, 0
  border_size = 1
  resize_on_border = true
  extend_border_grab_area = 1
  layout = dwindle
  allow_tearing = true
}

decoration {
  rounding = 4

  blur {
    enabled = true
    size= 6
    passes = 2
    new_optimizations = true
  }

  shadow {
    enabled = false
    range = 4
    render_power = 1
  }

}

render {
  cm_enabled = true
}

animations {
  enabled = true
  bezier = smooth, 0.2, 0.9, 0.1, 1.0
  animation = windows, 1, 1, smooth, slide
  animation = windowsOut, 1, 1, smooth, slide
  animation = border, 1, 1, smooth
  animation = fade, 1, 1, smooth
  animation = workspaces, 1, 1, smooth, slide
}

dwindle {
  pseudotile = yes
  preserve_split = yes
}

misc {
  # disable_hyprland_logo = true
  # disable_splash_rendering = true
}

group {
  groupbar {
    enabled = true
    font_size = 11
  }
}

windowrule = workspace special:scratchpad silent, match:class ^(spotify|Spotify)$
windowrule = workspace special:scratchpad silent, match:class ^(steam|Steam)$

source = ~/.config/hypr/monitors.conf
source = ~/.config/hypr/input.conf
source = ~/.config/hypr/looknfeel.conf
source = ~/.config/hypr/bindings.conf
source = ~/.config/hypr/autostart.conf
