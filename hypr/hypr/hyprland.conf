$mainMod = SUPER
$terminal = ghostty
$browser = vivaldi
$fileManager = dolphin
$menu = walker
$discord = vesktop

env = XCURSOR_SIZE,24
env = HYPRCURSOR_SIZE,24
env = QT_QPA_PLATFORM,wayland
env = GDK_BACKEND,wayland,x11
env = SDL_VIDEODRIVER,wayland
env = CLUTTER_BACKEND,wayland

general {
  gaps_in = 2
  gaps_out = 0, 4, 4, 4
  border_size = 2
  resize_on_border = true
  extend_border_grab_area = 0
  layout = dwindle
  allow_tearing = true
}

decoration {
  rounding = 8

  blur {
    enabled = true
    size= 6
    passes = 2
    new_optimizations = true
  }

  shadow {
    enabled = true
    range = 16
    render_power = 3
  }

}

render {
  cm_enabled = true
}

animations {
  enabled = yes
  bezier = smooth, 0.2, 0.9, 0.1, 1.0
  animation = windows, 1, 6, smooth, slide
  animation = windowsOut, 1, 5, smooth, slide
  animation = border, 1, 8, smooth
  animation = fade, 1, 6, smooth
  animation = workspaces, 1, 5, smooth, slide
}

dwindle {
  pseudotile = yes
  preserve_split = yes
}

misc {
  # disable_hyprland_logo = true
  # disable_splash_rendering = true
}

group {
  groupbar {
    enabled = true
    font_size = 11
  }
}

windowrule = workspace special:scratchpad silent, match:class ^(spotify|Spotify)$
windowrule = workspace special:scratchpad silent, match:class ^(steam|Steam)$
windowrule = match:class ^(vivaldi-stable)$, border_size 0

source = ~/.config/hypr/monitors.conf
source = ~/.config/hypr/input.conf
source = ~/.config/hypr/looknfeel.conf
source = ~/.config/hypr/bindings.conf
source = ~/.config/hypr/autostart.conf
